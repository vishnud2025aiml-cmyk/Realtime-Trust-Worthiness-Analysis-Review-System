<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TrustAI Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: Inter; background:#0b1220; color:white; }

.card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
}

.sidebar {
  background: rgba(255,255,255,0.03);
  border-right: 1px solid rgba(255,255,255,0.08);
}

canvas {
  width: 100% !important;
  height: 250px !important;
}
</style>
</head>

<body class="flex">

<!-- SIDEBAR -->
<div class="sidebar w-64 p-5 min-h-screen">
  <h1 class="text-xl font-bold text-indigo-400">TrustAI</h1>

  <div class="mt-8 space-y-3 text-sm">
    <a href="/dashboard" class="block p-2 rounded bg-indigo-600">Dashboard</a>
    <a href="/" class="block p-2 hover:bg-white/10 rounded">← Back to Analyzer</a>
  </div>
</div>

<!-- MAIN -->
<div class="flex-1 p-6">

<!-- TOP STATS -->
<div class="grid grid-cols-3 gap-4">

  <div class="card p-4">
    <p>Total Reviews</p>
    <h2 id="total" class="text-2xl font-bold">0</h2>
  </div>

  <div class="card p-4">
    <p>Fake Detected</p>
    <h2 id="fake" class="text-2xl text-red-400 font-bold">0</h2>
  </div>

  <div class="card p-4">
    <p>Genuine</p>
    <h2 id="genuine" class="text-2xl text-green-400 font-bold">0</h2>
  </div>

</div>

<!-- CHARTS -->
<div class="grid md:grid-cols-2 gap-6 mt-6">

  <div class="card p-4">
    <h3 class="mb-2">Live Trend</h3>
    <canvas id="chart1"></canvas>
  </div>

  <div class="card p-4">
    <h3 class="mb-2">Distribution</h3>
    <canvas id="chart2"></canvas>
  </div>

</div>

</div>

<script>

let chart1, chart2;

async function loadDashboard(){

  const res = await fetch("/dashboard_data");
  const stats = await res.json();

  document.getElementById("total").innerText = stats.TotalReviews || 0;
  document.getElementById("fake").innerText = stats.Fake || 0;
  document.getElementById("genuine").innerText = stats.Genuine || 0;

  if(chart1) chart1.destroy();
  if(chart2) chart2.destroy();

  chart1 = new Chart(document.getElementById("chart1"), {
    type: "line",
    data: {
      labels: ["Fake", "Genuine"],
      datasets: [{
        data: [stats.Fake || 0, stats.Genuine || 0],
        borderColor: "#6366f1",
        backgroundColor: "rgba(99,102,241,0.2)",
        fill: true,
        tension: 0.4
      }]
    }
  });

  chart2 = new Chart(document.getElementById("chart2"), {
    type: "bar",
    data: {
      labels: ["Fake", "Genuine"],
      datasets: [{
        data: [stats.Fake || 0, stats.Genuine || 0],
        backgroundColor: ["red","green"]
      }]
    }
  });
}

loadDashboard();
setInterval(loadDashboard, 3000);

</script>

</body>
</html>
