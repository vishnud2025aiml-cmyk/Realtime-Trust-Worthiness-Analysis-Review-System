<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TrustAI Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: Inter; background:#0b1220; color:white; }

.card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
}

.sidebar {
  background: rgba(255,255,255,0.03);
  border-right: 1px solid rgba(255,255,255,0.08);
}

canvas {
  width: 100% !important;
  height: 250px !important;
}
</style>
</head>

<body class="flex">

<!-- SIDEBAR -->
<div class="sidebar w-64 p-5 min-h-screen">
  <h1 class="text-xl font-bold text-indigo-400">TrustAI</h1>

  <div class="mt-8 space-y-3 text-sm">
    <a href="/dashboard" class="block p-2 rounded bg-indigo-600">Dashboard</a>
    <a href="/" class="block p-2 hover:bg-white/10 rounded">← Back to Analyzer</a>
  </div>
</div>

<!-- MAIN -->
<div class="flex-1 p-6">

<!-- TOP STATS -->
<div class="grid grid-cols-3 gap-4">

  <div class="card p-4">
    <p>Total Reviews</p>
    <h2 id="total" class="text-2xl font-bold">0</h2>
  </div>

  <div class="card p-4">
    <p>Fake Detected</p>
    <h2 id="fake" class="text-2xl text-red-400 font-bold">0</h2>
  </div>

  <div class="card p-4">
    <p>Genuine</p>
    <h2 id="genuine" class="text-2xl text-green-400 font-bold">0</h2>
  </div>

</div>

<!-- CHARTS -->
<div class="grid md:grid-cols-2 gap-6 mt-6">

  <div class="card p-4">
    <h3 class="mb-2">Live Trend</h3>
    <canvas id="chart1"></canvas>
  </div>

  <div class="card p-4">
    <h3 class="mb-2">Distribution</h3>
    <canvas id="chart2"></canvas>
  </div>

</div>

</div>

<script>

let chart1 = null;
let chart2 = null;

function initCharts(){

  const ctx1 = document.getElementById("chart1").getContext("2d");
  const ctx2 = document.getElementById("chart2").getContext("2d");

  // LINE CHART
  chart1 = new Chart(ctx1, {
    type: "line",
    data: {
      labels: [],
      datasets: [
        {
          label: "Fake %",
          data: [],
          borderColor: "red",
          tension: 0.4
        },
        {
          label: "Genuine %",
          data: [],
          borderColor: "green",
          tension: 0.4
        }
      ]
    },
    options: {
      responsive: true,
      animation: false,
      scales: {
        y: {
          beginAtZero: true,
          max: 100
        }
      }
    }
  });

  // BAR CHART (DISTRIBUTION)
  chart2 = new Chart(ctx2, {
    type: "bar",
    data: {
      labels: ["Fake", "Genuine"],
      datasets: [{
        label: "Total Count",
        data: [0, 0],
        backgroundColor: ["#ef4444", "#22c55e"]
      }]
    },
    options: {
      responsive: true,
      animation: false,
      scales: {
        y: {
          beginAtZero: true,
          ticks: {
            precision: 0,
            stepSize: 1   // important for small values
          }
        }
      }
    }
  });
}

async function loadDashboard(){

  try {
    const res = await fetch("/dashboard_data");
    const stats = await res.json();

    // ✅ FIX: ensure integers (dynamic, not fixed)
    let fake = Math.floor(Number(stats.Fake || 0));
    let genuine = Math.floor(Number(stats.Genuine || 0));
    let history = stats.history || [];

    console.log("DATA:", fake, genuine);

    // TEXT UPDATE
    document.getElementById("total").innerText = stats.TotalReviews || 0;
    document.getElementById("fake").innerText = fake;
    document.getElementById("genuine").innerText = genuine;

    // PROCESS HISTORY
    let labels = [];
    let fakeData = [];
    let genuineData = [];

    history.forEach((h, i) => {
      labels.push("R" + (i+1));

      if(h.type === "Fake"){
        fakeData.push(h.value);
        genuineData.push(0);
      } else {
        fakeData.push(0);
        genuineData.push(h.value);
      }
    });

    // UPDATE LINE CHART
    chart1.data.labels = labels;
    chart1.data.datasets[0].data = fakeData;
    chart1.data.datasets[1].data = genuineData;
    chart1.update('none');

    // ✅ UPDATE BAR CHART (WORKING)
    chart2.data.datasets[0].data = [fake, genuine];
    chart2.update('none');

  } catch (err) {
    console.error("Dashboard Error:", err);
  }
}

// INIT
initCharts();
loadDashboard();

// AUTO REFRESH (dynamic)
setInterval(loadDashboard, 2000);

</script>

</body>
</html>
